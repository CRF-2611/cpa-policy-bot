<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>CPA Policy Bot</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --yellow: #FDBB30;
      --navy:   #1A3A5C;
      --navy-light: #2a5080;
      --bg:     #f4f6f9;
      --white:  #ffffff;
      --text:   #1a1a2e;
      --muted:  #6b7280;
      --border: #dde3ea;
      --radius: 12px;
    }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: var(--bg);
      color: var(--text);
      height: 100dvh;
      display: flex;
      flex-direction: column;
    }

    /* ── Header ── */
    header {
      background: var(--navy);
      color: var(--white);
      padding: 0 1.25rem;
      height: 56px;
      display: flex;
      align-items: center;
      gap: 0.75rem;
      flex-shrink: 0;
    }

    .logo {
      width: 32px;
      height: 32px;
      background: var(--yellow);
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      font-weight: 800;
      color: var(--navy);
      font-size: 0.85rem;
      flex-shrink: 0;
    }

    header h1 { font-size: 1rem; font-weight: 600; }
    header p  { font-size: 0.75rem; opacity: 0.7; margin-top: 1px; }

    /* ── Password gate ── */
    #auth-screen {
      flex: 1;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 1rem;
    }

    .auth-card {
      background: var(--white);
      border-radius: var(--radius);
      padding: 2rem;
      width: 100%;
      max-width: 380px;
      box-shadow: 0 4px 24px rgba(0,0,0,0.08);
      text-align: center;
    }

    .auth-card h2 { font-size: 1.2rem; color: var(--navy); margin-bottom: 0.5rem; }
    .auth-card p  { font-size: 0.875rem; color: var(--muted); margin-bottom: 1.5rem; }

    .auth-card input {
      width: 100%;
      padding: 0.65rem 1rem;
      border: 1.5px solid var(--border);
      border-radius: 8px;
      font-size: 1rem;
      outline: none;
      transition: border-color 0.15s;
      margin-bottom: 0.75rem;
    }

    .auth-card input:focus { border-color: var(--navy); }

    .auth-card .error {
      color: #dc2626;
      font-size: 0.8rem;
      margin-bottom: 0.5rem;
      min-height: 1.2em;
    }

    /* ── Buttons ── */
    button {
      cursor: pointer;
      border: none;
      border-radius: 8px;
      font-size: 0.9rem;
      font-weight: 600;
      padding: 0.65rem 1.25rem;
      transition: opacity 0.15s, background 0.15s;
    }

    button:disabled { opacity: 0.5; cursor: not-allowed; }

    .btn-primary {
      background: var(--yellow);
      color: var(--navy);
      width: 100%;
    }

    .btn-primary:hover:not(:disabled) { background: #e8a820; }

    /* ── Chat screen ── */
    #chat-screen {
      display: none;
      flex: 1;
      flex-direction: column;
      overflow: hidden;
    }

    #messages {
      flex: 1;
      overflow-y: auto;
      padding: 1.25rem;
      display: flex;
      flex-direction: column;
      gap: 1rem;
    }

    .message {
      display: flex;
      gap: 0.625rem;
      max-width: 820px;
      width: 100%;
    }

    .message.user  { align-self: flex-end; flex-direction: row-reverse; }
    .message.bot   { align-self: flex-start; }

    .avatar {
      width: 32px;
      height: 32px;
      border-radius: 50%;
      flex-shrink: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 0.75rem;
      font-weight: 700;
    }

    .message.user .avatar { background: var(--navy); color: var(--white); }
    .message.bot  .avatar { background: var(--yellow); color: var(--navy); }

    .bubble {
      padding: 0.75rem 1rem;
      border-radius: var(--radius);
      font-size: 0.9rem;
      line-height: 1.6;
      max-width: calc(100% - 44px);
    }

    .message.user .bubble {
      background: var(--navy);
      color: var(--white);
      border-bottom-right-radius: 4px;
    }

    .message.bot .bubble {
      background: var(--white);
      color: var(--text);
      border-bottom-left-radius: 4px;
      box-shadow: 0 1px 4px rgba(0,0,0,0.07);
    }

    /* Markdown styles inside bot bubble */
    .bubble h1, .bubble h2, .bubble h3 {
      color: var(--navy);
      margin: 0.75rem 0 0.25rem;
      line-height: 1.3;
    }

    .bubble h1 { font-size: 1.1rem; }
    .bubble h2 { font-size: 1rem; }
    .bubble h3 { font-size: 0.95rem; }

    .bubble p  { margin: 0.4rem 0; }
    .bubble ul, .bubble ol { padding-left: 1.25rem; margin: 0.4rem 0; }
    .bubble li { margin: 0.2rem 0; }
    .bubble strong { font-weight: 700; }
    .bubble em     { font-style: italic; }

    .bubble hr {
      border: none;
      border-top: 1px solid var(--border);
      margin: 0.75rem 0;
    }

    /* Typing indicator */
    .typing-indicator .bubble {
      display: flex;
      gap: 5px;
      align-items: center;
      padding: 0.9rem 1rem;
    }

    .dot {
      width: 7px;
      height: 7px;
      background: var(--muted);
      border-radius: 50%;
      animation: bounce 1.2s infinite;
    }

    .dot:nth-child(2) { animation-delay: 0.2s; }
    .dot:nth-child(3) { animation-delay: 0.4s; }

    @keyframes bounce {
      0%, 80%, 100% { transform: translateY(0); }
      40%           { transform: translateY(-6px); }
    }

    /* ── Input area ── */
    #input-area {
      background: var(--white);
      border-top: 1px solid var(--border);
      padding: 0.75rem 1.25rem;
      display: flex;
      gap: 0.625rem;
      align-items: flex-end;
    }

    #user-input {
      flex: 1;
      padding: 0.625rem 0.875rem;
      border: 1.5px solid var(--border);
      border-radius: 10px;
      font-size: 0.9rem;
      font-family: inherit;
      resize: none;
      outline: none;
      min-height: 42px;
      max-height: 160px;
      line-height: 1.5;
      transition: border-color 0.15s;
    }

    #user-input:focus { border-color: var(--navy); }

    #send-btn {
      background: var(--yellow);
      color: var(--navy);
      padding: 0.6rem 1rem;
      border-radius: 10px;
      flex-shrink: 0;
      font-size: 0.875rem;
    }

    #send-btn:hover:not(:disabled) { background: #e8a820; }

    /* Scrollbar */
    #messages::-webkit-scrollbar { width: 5px; }
    #messages::-webkit-scrollbar-track { background: transparent; }
    #messages::-webkit-scrollbar-thumb { background: var(--border); border-radius: 10px; }
  </style>
</head>
<body>

<header>
  <div class="logo">LD</div>
  <div>
    <h1>CPA Policy Bot</h1>
    <p>Liberal Democrat policy assistant</p>
  </div>
</header>

<!-- Password gate -->
<div id="auth-screen">
  <div class="auth-card">
    <h2>Sign in</h2>
    <p>Enter the access password to continue.</p>
    <input type="password" id="password-input" placeholder="Password" autocomplete="current-password" />
    <div class="error" id="auth-error"></div>
    <button class="btn-primary" id="auth-btn">Continue</button>
  </div>
</div>

<!-- Chat interface -->
<div id="chat-screen">
  <div id="messages"></div>
  <div id="input-area">
    <textarea id="user-input" rows="1" placeholder="Ask about Lib Dem policy…"></textarea>
    <button id="send-btn">Send</button>
  </div>
</div>

<script>
  // ── Configuration ──────────────────────────────────────────────────────────
  // Update this to your deployed Cloudflare Worker URL
  const API_BASE = (window.location.hostname === 'localhost' || window.location.hostname === '127.0.0.1')
    ? 'http://localhost:8787'
    : 'https://cpa-policy-bot.YOUR_SUBDOMAIN.workers.dev';

  // ── State ──────────────────────────────────────────────────────────────────
  let password = '';
  let conversationMessages = [];

  // ── Auth ───────────────────────────────────────────────────────────────────
  const authScreen  = document.getElementById('auth-screen');
  const chatScreen  = document.getElementById('chat-screen');
  const authBtn     = document.getElementById('auth-btn');
  const authError   = document.getElementById('auth-error');
  const passwordInput = document.getElementById('password-input');

  passwordInput.addEventListener('keydown', e => {
    if (e.key === 'Enter') authBtn.click();
  });

  authBtn.addEventListener('click', async () => {
    const val = passwordInput.value.trim();
    if (!val) { authError.textContent = 'Please enter the password.'; return; }

    authBtn.disabled = true;
    authError.textContent = '';

    // Verify the password by making a test chat request
    try {
      const res = await fetch(`${API_BASE}/api/chat`, {
        method: 'POST',
        headers: {
          'Content-Type': 'application/json',
          'Authorization': `Bearer ${val}`,
        },
        body: JSON.stringify({ messages: [{ role: 'user', content: 'hi' }] }),
      });

      if (res.status === 401) {
        authError.textContent = 'Incorrect password. Please try again.';
        authBtn.disabled = false;
        return;
      }

      password = val;
      authScreen.style.display = 'none';
      chatScreen.style.display = 'flex';
      addBotMessage('Hello! I\'m the **CPA Policy Bot**. Ask me about Liberal Democrat policy, party lines, or parliamentary activity and I\'ll search our policy database for you.');
      userInput.focus();
    } catch {
      authError.textContent = 'Could not connect to the server. Please try again.';
      authBtn.disabled = false;
    }
  });

  // ── Chat ───────────────────────────────────────────────────────────────────
  const messagesEl = document.getElementById('messages');
  const userInput  = document.getElementById('user-input');
  const sendBtn    = document.getElementById('send-btn');

  // Auto-resize textarea
  userInput.addEventListener('input', () => {
    userInput.style.height = 'auto';
    userInput.style.height = Math.min(userInput.scrollHeight, 160) + 'px';
  });

  userInput.addEventListener('keydown', e => {
    if (e.key === 'Enter' && !e.shiftKey) {
      e.preventDefault();
      sendBtn.click();
    }
  });

  sendBtn.addEventListener('click', sendMessage);

  async function sendMessage() {
    const text = userInput.value.trim();
    if (!text || sendBtn.disabled) return;

    addUserMessage(text);
    userInput.value = '';
    userInput.style.height = 'auto';
    sendBtn.disabled = true;

    conversationMessages.push({ role: 'user', content: text });

    const typingEl = addTypingIndicator();

    try {
      const res = await fetch(`${API_BASE}/api/chat`, {
        method: 'POST',
        headers: {
          'Content-Type': 'application/json',
          'Authorization': `Bearer ${password}`,
        },
        body: JSON.stringify({ messages: conversationMessages }),
      });

      typingEl.remove();

      if (!res.ok) {
        const data = await res.json().catch(() => ({}));
        addBotMessage(`Sorry, something went wrong: ${data.error || res.statusText}`);
        conversationMessages.pop();
        return;
      }

      const data = await res.json();
      const reply = data.response ?? 'Sorry, I didn\'t get a response.';

      conversationMessages = data.messages ?? [...conversationMessages, { role: 'assistant', content: reply }];
      addBotMessage(reply);
    } catch (err) {
      typingEl.remove();
      addBotMessage('Sorry, I couldn\'t reach the server. Please check your connection and try again.');
      conversationMessages.pop();
    } finally {
      sendBtn.disabled = false;
      userInput.focus();
    }
  }

  function addUserMessage(text) {
    const el = createMessageEl('user', escapeHtml(text));
    messagesEl.appendChild(el);
    scrollToBottom();
    return el;
  }

  function addBotMessage(markdown) {
    const el = createMessageEl('bot', renderMarkdown(markdown));
    messagesEl.appendChild(el);
    scrollToBottom();
    return el;
  }

  function addTypingIndicator() {
    const el = document.createElement('div');
    el.className = 'message bot typing-indicator';
    el.innerHTML = `
      <div class="avatar">LD</div>
      <div class="bubble">
        <span class="dot"></span>
        <span class="dot"></span>
        <span class="dot"></span>
      </div>`;
    messagesEl.appendChild(el);
    scrollToBottom();
    return el;
  }

  function createMessageEl(role, htmlContent) {
    const el = document.createElement('div');
    el.className = `message ${role}`;
    const avatarText = role === 'user' ? 'You' : 'LD';
    el.innerHTML = `
      <div class="avatar">${avatarText}</div>
      <div class="bubble">${htmlContent}</div>`;
    return el;
  }

  function scrollToBottom() {
    messagesEl.scrollTop = messagesEl.scrollHeight;
  }

  // ── Minimal Markdown renderer ──────────────────────────────────────────────
  function renderMarkdown(text) {
    // Escape HTML first for safety, then apply markdown transforms
    let html = escapeHtml(text);

    // Headers
    html = html.replace(/^### (.+)$/gm, '<h3>$1</h3>');
    html = html.replace(/^## (.+)$/gm, '<h2>$1</h2>');
    html = html.replace(/^# (.+)$/gm, '<h1>$1</h1>');

    // Bold and italic
    html = html.replace(/\*\*\*(.+?)\*\*\*/g, '<strong><em>$1</em></strong>');
    html = html.replace(/\*\*(.+?)\*\*/g, '<strong>$1</strong>');
    html = html.replace(/\*(.+?)\*/g, '<em>$1</em>');

    // Horizontal rule
    html = html.replace(/^---$/gm, '<hr>');

    // Unordered lists — group consecutive bullet lines
    html = html.replace(/((?:^- .+\n?)+)/gm, match => {
      const items = match.trim().split('\n').map(l => `<li>${l.slice(2)}</li>`).join('');
      return `<ul>${items}</ul>`;
    });

    // Ordered lists
    html = html.replace(/((?:^\d+\. .+\n?)+)/gm, match => {
      const items = match.trim().split('\n').map(l => `<li>${l.replace(/^\d+\. /, '')}</li>`).join('');
      return `<ol>${items}</ol>`;
    });

    // Paragraphs — blank lines become paragraph breaks
    html = html.replace(/\n{2,}/g, '</p><p>');
    html = `<p>${html}</p>`;

    // Single newlines become <br> within paragraphs (but not inside list/heading tags)
    html = html.replace(/(?<!>)\n(?!<)/g, '<br>');

    // Clean up empty paragraphs that may wrap block elements
    html = html.replace(/<p>(<(?:h[123]|ul|ol|hr)[^>]*>)/g, '$1');
    html = html.replace(/(<\/(?:h[123]|ul|ol)>)<\/p>/g, '$1');

    return html;
  }

  function escapeHtml(str) {
    return str
      .replace(/&/g, '&amp;')
      .replace(/</g, '&lt;')
      .replace(/>/g, '&gt;')
      .replace(/"/g, '&quot;');
  }
</script>
</body>
</html>
