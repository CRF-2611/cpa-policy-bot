name                 = "cpa-policy-bot"
main                 = "worker/src/index.ts"
compatibility_date   = "2026-04-30"
compatibility_flags  = ["nodejs_compat"]

[assets]
directory = "./frontend"
binding   = "ASSETS"

[triggers]
crons = [
  "0 6 * * *",   # 06:00 UTC daily — Notion Lines to Take
  "30 6 * * *",  # 06:30 UTC daily — Google Drive briefings
  "0 7 * * *",   # 07:00 UTC daily — Parliamentary activity
  "30 7 * * *",  # 07:30 UTC daily — Manifesto, rolling top lines, policy papers
]

[vars]
SUPABASE_URL      = ""
SUPABASE_ANON_KEY = ""

# Secrets — set via Cloudflare dashboard or `wrangler secret put`:
# ANTHROPIC_API_KEY
# NOTION_TOKEN
# GOOGLE_SERVICE_ACCOUNT_JSON
# SUPABASE_SERVICE_ROLE_KEY
# APP_PASSWORD
# SYNC_SECRET
