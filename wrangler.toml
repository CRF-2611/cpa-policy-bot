name                 = "cpa-policy-bot"
main                 = "worker/src/index.ts"
compatibility_date   = "2026-04-30"
compatibility_flags  = ["nodejs_compat"]

[assets]
directory = "./frontend"
binding   = "ASSETS"

[triggers]
crons = [
  "0 * * * *",   # Every hour — Notion Lines to Take (fast incremental once fully loaded)
  "30 6 * * *",  # 06:30 UTC daily — Google Drive briefings
  "0 7 * * *",   # 07:00 UTC daily — Parliamentary activity
]
